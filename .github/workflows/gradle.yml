# This workflow uses actions that are not certified by GitHub.
# They are provided by a third-party and are governed by
# separate terms of service, privacy policy, and support
# documentation.
# This workflow will build a Java project with Gradle and cache/restore any dependencies to improve the workflow execution time
# For more information see: https://docs.github.com/en/actions/automating-builds-and-tests/building-and-testing-java-with-gradle

name: Java CI with Gradle

on:
  push:
    branches: [ "main" ]
    paths:
      - '.github/workflows/gradle.yml'
      - 'gradlew*'
      - '**/*.kt'
      - '**/*.kts'
      - '**/*.properties'
      - '**/src/**/resources/**'
      - 'app/src/main/AndroidManifest.xml'
      - 'app/src/main/proto/**'
      - 'app/src/main/res/**'
      - 'app/src/test/**'
      - 'gradle/**'
      - '!version.properties'
  pull_request:
    branches: [ "main" ]
  merge_group:
    types: [ checks_requested ]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Build and test
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false

      - name: Generate secret files
        run: |
          echo ${{ secrets.KEYSTORE_PROPERTIES }} | base64 -d > ${{ github.workspace }}/keystore.properties
          echo ${{ secrets.KEYSTORE_FILE }} | base64 -d > ${{ github.workspace }}/app/artemis-agent-keystore.jks
          echo ${{ secrets.GOOGLE_SERVICES }} | base64 -d > ${{ github.workspace }}/app/google-services.json

      - name: Set up JDK 21
        uses: actions/setup-java@ad2b38190b15e4d6bdf0c97fb4fca8412226d287 # v5.3.0
        with:
          java-version-file: .tool-versions
          distribution: 'temurin'

      # Configure Gradle for optimal use in GitHub Actions, including caching of downloaded dependencies.
      # See: https://github.com/gradle/actions/blob/main/setup-gradle/README.md
      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@3f131e8634966bd73d06cc69884922b02e6faf92 # v6.2.0

      - name: Build with Gradle Wrapper
        uses: burrunan/gradle-cache-action@4b67497abd37a511d6c1dc6299bdd84ff39f7bf5 # v3.0.2
        with:
          arguments: build koverXmlReport

      - name: Upload Unit Test Results
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        if: always() && github.event_name != 'merge_group'
        with:
          name: Unit Test Results
          path: |
            ${{ github.workspace }}/**/build/test-results/**/*.xml
            !${{ github.workspace }}/**/konsist/build/test-results/**/*.xml

      - name: Upload Konsist Test Results
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        if: always() && github.event_name != 'merge_group'
        with:
          name: Konsist Test Results
          path: |
            ${{ github.workspace }}/**/konsist/build/test-results/**/*.xml

      - name: Upload Code Coverage Reports
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        if: always() && github.event_name != 'merge_group'
        with:
          name: Code Coverage Reports
          path: |
            ${{ github.workspace }}/**/build/reports/kover/report.xml

  test-results:
    name: Publish test results
    needs: build
    runs-on: ubuntu-latest
    if: always() && github.event_name != 'merge_group'
    permissions:
      checks: write
      pull-requests: write
    steps:
      - name: Download Unit Test Results
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: Unit Test Results
          path: tests

      - name: Download Konsist Test Results
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: Konsist Test Results
          path: konsist

      - name: Publish Unit Test Results
        uses: EnricoMi/publish-unit-test-result-action/linux@d0a4676d0e0b938bc201470d88276b7c74c712b3 # v2.24.0
        with:
          check_name: Unit Test Results
          files: tests/**/*.xml

      - name: Publish Konsist Test Results
        uses: EnricoMi/publish-unit-test-result-action/linux@d0a4676d0e0b938bc201470d88276b7c74c712b3 # v2.24.0
        if: always()
        with:
          check_name: Konsist Test Results
          files: konsist/**/*.xml

  coverage:
    name: Report code coverage
    needs: build
    runs-on: ubuntu-latest
    if: always() && github.event_name != 'merge_group'
    strategy:
      matrix:
        module:
          - app
          - IAN
          - IAN/enums
          - IAN/grid
          - IAN/listener
          - IAN/packets
          - IAN/udp
          - IAN/util
          - IAN/vesseldata
          - IAN/world
    permissions:
      checks: write
      pull-requests: write
    steps:
      - name: Download Code Coverage Reports
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: Code Coverage Reports
          path: coverage

      - name: Code Coverage (${{ matrix.module }})
        uses: mi-kas/kover-report@db9938358b8e1e6175dd4136132bf4eb7aa4ae6d # v2.4
        with:
          title: Code Coverage (${{ matrix.module }})
          path: coverage/${{ matrix.module }}/build/reports/kover/report.xml
          token: ${{ secrets.GITHUB_TOKEN }}
          update-comment: true
          min-coverage-overall: ${{ matrix.module == 'app' && '0' || '98' }}

  total-coverage:
    name: Report code coverage (total)
    needs: coverage
    runs-on: ubuntu-latest
    if: always() && github.event_name != 'merge_group'
    permissions:
      checks: write
      pull-requests: write
    steps:
      - name: Download Code Coverage Reports
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: Code Coverage Reports
          path: coverage

      - name: Total Code Coverage
        uses: mi-kas/kover-report@db9938358b8e1e6175dd4136132bf4eb7aa4ae6d # v2.4
        with:
          title: Total Code Coverage
          path: coverage/**/build/reports/kover/report.xml
          token: ${{ secrets.GITHUB_TOKEN }}
          update-comment: true
          min-coverage-overall: 90
