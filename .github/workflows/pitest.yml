name: Pitest Mutation Testing

on:
  push:
    branches: [ "main" ]
    paths:
      - .github/workflows/pitest.yml
      - build-logic/*.gradle.kts
      - build-logic/src/main/kotlin/artemis/agent/gradle/Helpers.kt
      - gradle/**
      - IAN/build.gradle.kts
      - IAN/*/build.gradle.kts
      - IAN/src/**/*.kt
      - IAN/*/src/**/*.kt

jobs:
  pitest:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        path:
          - 'IAN'
          - 'IAN/enums'
          - 'IAN/grid'
          - 'IAN/listener'
          - 'IAN/packets'
          - 'IAN/udp'
          - 'IAN/util'
          - 'IAN/vesseldata'
          - 'IAN/world'
    permissions:
      contents: read
      checks: write
      pull-requests: write
    concurrency:
      group: ${{ github.workflow }}-${{ matrix.path }}

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 2

      - name: Restore Pitest history file
        uses: actions/cache/restore@668228422ae6a00e4ad889ee87cd7109ec5666a7 # v5.0.4
        with:
          path: ${{ github.workspace }}/${{ matrix.path }}/build/pitHistory.txt
          key: pitest-history:${{ matrix.path }}

      - name: Generate secret files
        run: |
          echo ${{ secrets.KEYSTORE_PROPERTIES }} | base64 -d > ${{ github.workspace }}/keystore.properties

      - name: Set up JDK 21
        uses: actions/setup-java@be666c2fcd27ec809703dec50e508c2fdc7f6654 # v5.2.0
        with:
          java-version-file: .tool-versions
          distribution: 'temurin'

      # Configure Gradle for optimal use in GitHub Actions, including caching of downloaded dependencies.
      # See: https://github.com/gradle/actions/blob/main/setup-gradle/README.md
      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@0723195856401067f7a2779048b490ace7a47d7c # v5.0.2

      - name: Determine Gradle module
        id: get-module
        uses: mad9000/actions-find-and-replace-string@bce4d50390d08b67e1822bd72fb54b3cf11b0ce9 # 5
        with:
          source: ${{ matrix.path }}
          find: '/'
          replace: ':'

      - name: Run Pitest
        run: ./gradlew :${{ steps.get-module.outputs.value }}:pitest

      - name: Check for any mutations
        id: mutations-check
        uses: chrisreddington/validate-file-exists@ff1ba041fbaa672eeb84a53b8c33ffd381c080f2 # v0.0.10
        with:
          required-files: ${{ matrix.path }}/build/reports/pitest/mutations.xml

      - name: Upload Pitest report
        if: steps.mutations-check.outputs.exists == 'true'
        uses: Bonajo/pitest-report-action@e8b993da7e324031001987a0fea6a459c95d33e1 # v1.0.1
        with:
          name: Pitest Report (${{ matrix.path }})
          file: ${{ github.workspace }}/${{ matrix.path }}/build/reports/pitest/mutations.xml
          annotation-types: ALL

      - name: Cache Pitest history file
        uses: actions/cache/save@668228422ae6a00e4ad889ee87cd7109ec5666a7 # v5.0.4
        with:
          path: ${{ github.workspace }}/${{ matrix.path }}/build/pitHistory.txt
          key: pitest-history:${{ matrix.path }}-${{ hashFiles('**/build/pitHistory.txt') }}
