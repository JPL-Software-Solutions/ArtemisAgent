name: Dependency Analysis

on:
  push:
    branches: [ "main" ]
    paths:
      - '.github/workflows/dependency-analysis.yml'
      - '**/*.kt'
      - '**/*.kts'
      - 'app/src/main/res/**'
      - 'gradle/**'
  pull_request:
    branches: [ "main" ]
    paths:
      - '.github/workflows/dependency-analysis.yml'
      - '**/*.kt'
      - '**/*.kts'
      - 'app/src/main/res/**'
      - 'gradle/**'
  merge_group:
    types: [ checks_requested ]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  pull-requests: write

jobs:
  analysis:
    name: Dependency Analysis
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false

      - name: Generate secret files
        run: |
          echo ${{ secrets.KEYSTORE_PROPERTIES }} | base64 -d > ${{ github.workspace }}/keystore.properties
          echo ${{ secrets.GOOGLE_SERVICES }} | base64 -d > ${{ github.workspace }}/app/google-services.json

      - name: Set up JDK 21
        uses: actions/setup-java@be666c2fcd27ec809703dec50e508c2fdc7f6654 # v5.2.0
        with:
          java-version-file: .tool-versions
          distribution: 'temurin'

      # Configure Gradle for optimal use in GitHub Actions, including caching of downloaded dependencies.
      # See: https://github.com/gradle/actions/blob/main/setup-gradle/README.md
      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@5e2ebd065dc2488b7a6ad670704656cbbe1e8f60 # v6.1.1

      - name: Run dependency analysis
        uses: burrunan/gradle-cache-action@4b67497abd37a511d6c1dc6299bdd84ff39f7bf5 # v3.0.2
        with:
          arguments: buildHealth

      - name: Check report
        id: check-build-health
        if: ${{ always() }}
        run: |
          echo "output<<EOF" >> "$GITHUB_OUTPUT"
          if [ -s build/reports/dependency-analysis/build-health-report.txt ]; then
            cat build/reports/dependency-analysis/build-health-report.txt | tee -a "$GITHUB_STEP_SUMMARY" | tee -a "$GITHUB_OUTPUT"
            exit 1
          else
            echo "No dependency violations found. :+1:" | tee -a "$GITHUB_STEP_SUMMARY" | tee -a "$GITHUB_OUTPUT"
          fi
          echo EOF >> "$GITHUB_OUTPUT"

      - name: Report health status
        if: ${{ always() && github.event_name == 'pull_request' }}
        uses: thollander/actions-comment-pull-request@24bffb9b452ba05a4f3f77933840a6a841d1b32b # v3.0.1
        with:
          message: ${{ steps.check-build-health.outputs.output }}
          comment-tag: dependency-analysis
