name: Android Lint

on:
  push:
    branches: [ "main" ]
    paths:
      - '.github/workflows/android-lint.yml'
      - '*.gradle.kts'
      - 'app/**/*.kt'
      - 'app/**/*.kts'
      - 'app/lint.xml'
      - 'app/src/main/AndroidManifest.xml'
      - 'app/src/main/proto/**'
      - 'app/src/main/res/**'
      - 'gradle/**'
  pull_request:
    branches: [ "main" ]
    paths:
      - '.github/workflows/android-lint.yml'
      - '*.gradle.kts'
      - 'app/**/*.kt'
      - 'app/**/*.kts'
      - 'app/lint.xml'
      - 'app/src/main/AndroidManifest.xml'
      - 'app/src/main/proto/**'
      - 'app/src/main/res/**'
      - 'gradle/**'

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  pull-requests: write
  security-events: write

jobs:
  lint:
    name: Android Lint
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      with:
        persist-credentials: false

    - name: Generate secret files
      run: |
        echo ${{ secrets.KEYSTORE_PROPERTIES }} | base64 -d > ${{ github.workspace }}/keystore.properties
        echo ${{ secrets.GOOGLE_SERVICES }} | base64 -d > ${{ github.workspace }}/app/google-services.json

    - name: Set up JDK 21
      uses: actions/setup-java@1bcf9fb12cf4aa7d266a90ae39939e61372fe520 # v5.4.0
      with:
        java-version-file: .tool-versions
        distribution: 'temurin'

    # Configure Gradle for optimal use in GitHub Actions, including caching of downloaded dependencies.
    # See: https://github.com/gradle/actions/blob/main/setup-gradle/README.md
    - name: Setup Gradle
      uses: gradle/actions/setup-gradle@3f131e8634966bd73d06cc69884922b02e6faf92 # v6.2.0

    - name: Android Lint
      uses: burrunan/gradle-cache-action@4b67497abd37a511d6c1dc6299bdd84ff39f7bf5 # v3.0.2
      with:
        arguments: lint

    - name: Report
      uses: hidakatsuya/action-report-android-lint@e95452c02063fc0a9920a545ffc9d0ee82b58bfb # v1.3.0
      with:
        result-path: app/**/reports/lint-results-debug.xml
        fail-on-warning: false

    - name: Upload app SARIF report
      uses: github/codeql-action/upload-sarif@8aad20d150bbac5944a9f9d289da16a4b0d87c1e # v4.36.2
      with:
        sarif_file: ${{ github.workspace }}/app/build/reports/lint-results-debug.sarif
        checkout_path: ${{ github.workspace }}
        category: "android-lint"

    - name: Upload Konsist SARIF report
      uses: github/codeql-action/upload-sarif@8aad20d150bbac5944a9f9d289da16a4b0d87c1e # v4.36.2
      with:
        sarif_file: ${{ github.workspace }}/app/konsist/build/reports/lint-results-debug.sarif
        checkout_path: ${{ github.workspace }}
        category: "konsist"
