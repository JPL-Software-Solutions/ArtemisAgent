# This workflow uses actions that are not certified by GitHub.
# They are provided by a third-party and are governed by
# separate terms of service, privacy policy, and support
# documentation.
# This workflow will build a Java project with Gradle and cache/restore any dependencies to improve the workflow execution time
# For more information see: https://docs.github.com/en/actions/automating-builds-and-tests/building-and-testing-java-with-gradle
#
# Dependency Review Action
#
# This Action will scan dependency manifest files that change as part of a Pull Request,
# surfacing known-vulnerable versions of the packages declared or updated in the PR.
# Once installed, if the workflow run is marked as required, PRs introducing known-vulnerable
# packages will be blocked from merging.
#
# Source repository: https://github.com/actions/dependency-review-action
# Public documentation: https://docs.github.com/en/code-security/supply-chain-security/understanding-your-software-supply-chain/about-dependency-review#dependency-review-enforcement

name: Java CI with Gradle

on:
  push:
    branches: [ "main" ]
    paths:
      - '.github/workflows/gradle.yml'
      - 'gradlew*'
      - '**/*.kt'
      - '**/*.kts'
      - '**/*.properties'
      - '**/src/**/resources/**'
      - 'app/src/main/AndroidManifest.xml'
      - 'app/src/main/proto/**'
      - 'app/src/main/res/**'
      - 'app/src/test/**'
      - 'gradle/**'
      - '!version.properties'
  pull_request:
    branches: [ "main" ]
  merge_group:
    types: [ checks_requested ]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Build and test
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Generate secret files
        run: |
          echo ${{ secrets.KEYSTORE_PROPERTIES }} | base64 -d > ${{ github.workspace }}/keystore.properties
          echo ${{ secrets.KEYSTORE_FILE }} | base64 -d > ${{ github.workspace }}/app/artemis-agent-keystore.jks
          echo ${{ secrets.GOOGLE_SERVICES }} | base64 -d > ${{ github.workspace }}/app/google-services.json
          echo ${{ secrets.KOTZILLA_API_KEY }} | base64 -d > ${{ github.workspace }}/app/kotzilla.json

      - name: Set up JDK 21
        uses: actions/setup-java@be666c2fcd27ec809703dec50e508c2fdc7f6654 # v5.2.0
        with:
          java-version-file: .tool-versions
          distribution: 'temurin'

      # Configure Gradle for optimal use in GitHub Actions, including caching of downloaded dependencies.
      # See: https://github.com/gradle/actions/blob/main/setup-gradle/README.md
      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@50e97c2cd7a37755bbfafc9c5b7cafaece252f6e # v6.1.0
        with:
          dependency-graph: generate-and-submit
          dependency-graph-exclude-configurations: 'detachedConfiguration.*'

      - name: Build with Gradle Wrapper
        uses: burrunan/gradle-cache-action@663fbad34e03c8f12b27f4999ac46e3d90f87eca # v3.0.1
        with:
          arguments: build koverXmlReport

      - name: Upload Unit Test Results
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        if: always() && github.event_name != 'merge_group'
        with:
          name: Unit Test Results
          path: |
            ${{ github.workspace }}/**/build/test-results/**/*.xml
            !${{ github.workspace }}/**/konsist/build/test-results/**/*.xml

      - name: Upload Konsist Test Results
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        if: always() && github.event_name != 'merge_group'
        with:
          name: Konsist Test Results
          path: |
            ${{ github.workspace }}/**/konsist/build/test-results/**/*.xml

      - name: Upload Code Coverage Reports
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        if: always() && github.event_name != 'merge_group'
        with:
          name: Code Coverage Reports
          path: |
            ${{ github.workspace }}/**/build/reports/kover/report.xml

  dependency-review:
    name: Dependency review
    runs-on: ubuntu-latest
    needs: build
    permissions:
      contents: read
      pull-requests: write
    steps:
      - name: 'Wait for base branch workflow run'
        uses: ArcticLampyrid/action-wait-for-workflow@ff297b23789206858260877c4b83026d90c6db8c # v1.3.0
        if: ${{ github.event_name == 'pull_request' }}
        timeout-minutes: 1
        with:
          workflow: gradle.yml
          branch: ${{ github.event.pull_request.base.ref }}
          sha: ${{ github.event.pull_request.base.sha }}
          wait-interval: 5

      - name: 'Checkout repository'
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: 'Dependency Review'
        uses: actions/dependency-review-action@2031cfc080254a8a887f58cffee85186f0e49e48 # v4.9.0
        # Commonly enabled options, see https://github.com/actions/dependency-review-action#configuration-options for all available options.
        with:
          comment-summary-in-pr: always
          fail-on-severity: moderate
          base-ref: ${{ github.event.pull_request.base.sha || 'main' }}
          head-ref: ${{ github.event.pull_request.head.sha || github.ref }}

  test-results:
    name: Publish test results
    needs: build
    runs-on: ubuntu-latest
    if: always() && github.event_name != 'merge_group'
    permissions:
      checks: write
      pull-requests: write
    steps:
      - name: Download Unit Test Results
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: Unit Test Results
          path: tests

      - name: Download Konsist Test Results
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: Konsist Test Results
          path: konsist

      - name: Publish Unit Test Results
        uses: EnricoMi/publish-unit-test-result-action/linux@c950f6fb443cb5af20a377fd0dfaa78838901040 # v2.23.0
        with:
          check_name: Unit Test Results
          files: tests/**/*.xml

      - name: Publish Konsist Test Results
        uses: EnricoMi/publish-unit-test-result-action/linux@c950f6fb443cb5af20a377fd0dfaa78838901040 # v2.23.0
        if: always()
        with:
          check_name: Konsist Test Results
          files: konsist/**/*.xml

  coverage:
    name: Report code coverage
    needs: build
    runs-on: ubuntu-latest
    if: always() && github.event_name != 'merge_group'
    strategy:
      matrix:
        module:
          - app
          - IAN
          - IAN/enums
          - IAN/grid
          - IAN/listener
          - IAN/packets
          - IAN/udp
          - IAN/util
          - IAN/vesseldata
          - IAN/world
    permissions:
      checks: write
      pull-requests: write
    steps:
      - name: Download Code Coverage Reports
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: Code Coverage Reports
          path: coverage

      - name: Code Coverage (${{ matrix.module }})
        uses: mi-kas/kover-report@d7cc6d4b9642e3f71800cc0e79bdb3ce4ba07bb6 # v2.1
        with:
          title: Code Coverage (${{ matrix.module }})
          path: coverage/${{ matrix.module }}/build/reports/kover/report.xml
          token: ${{ secrets.GITHUB_TOKEN }}
          update-comment: true
          min-coverage-overall: ${{ matrix.module == 'app' && '0' || '98' }}

  total-coverage:
    name: Report code coverage (total)
    needs: coverage
    runs-on: ubuntu-latest
    if: always() && github.event_name != 'merge_group'
    permissions:
      checks: write
      pull-requests: write
    steps:
      - name: Download Code Coverage Reports
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: Code Coverage Reports
          path: coverage

      - name: Total Code Coverage
        uses: mi-kas/kover-report@d7cc6d4b9642e3f71800cc0e79bdb3ce4ba07bb6 # v2.1
        with:
          title: Total Code Coverage
          path: coverage/**/build/reports/kover/report.xml
          token: ${{ secrets.GITHUB_TOKEN }}
          update-comment: true
          min-coverage-overall: 90
