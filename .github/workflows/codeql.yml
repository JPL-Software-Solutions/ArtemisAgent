# For most projects, this workflow file will not need changing; you simply need
# to commit it to your repository.
#
# You may wish to alter this file to override the set of languages analyzed,
# or to provide custom queries or build logic.
#
# ******** NOTE ********
# We have attempted to detect the languages in your repository. Please check
# the `language` matrix defined below to confirm you have the correct set of
# supported CodeQL languages.
#
name: "CodeQL"

on:
  push:
    branches: [ "main" ]
    paths:
      - '.github/workflows/**'
      - '.tool-versions'
      - 'Dangerfile'
      - 'Gemfile*'
      - '**/*.kt'
      - '**/*.kts'
      - '**/*.properties'
      - '**/src/**/resources/**'
      - 'app/src/main/AndroidManifest.xml'
      - 'app/src/main/proto/**'
      - 'app/src/main/res/**'
      - 'app/src/test/**'
      - 'app/proguard-rules.pro'
      - 'gradle/**'
  pull_request:
    branches: [ "main" ]
    paths:
      - '.github/workflows/**'
      - '.tool-versions'
      - 'Dangerfile'
      - 'Gemfile*'
      - '**/*.kt'
      - '**/*.kts'
      - '**/*.properties'
      - '**/src/**/resources/**'
      - 'app/src/main/AndroidManifest.xml'
      - 'app/src/main/proto/**'
      - 'app/src/main/res/**'
      - 'app/src/test/**'
      - 'app/proguard-rules.pro'
      - 'gradle/**'
  schedule:
    - cron: '20 19 * * 0'

jobs:
  generate-matrix:
    name: Build language matrix
    runs-on: ubuntu-latest
    permissions:
      contents: read
    outputs:
      matrix: ${{ steps.filter.outputs.matrix }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Check relevant files
        id: check-files
        if: ${{ github.event_name != 'schedule' }}
        uses: dorny/paths-filter@fbd0ab8f3e69293af611ebaee6363fc25e6d187d # v4.0.1
        with:
          filters: |
            actions:
              - '.github/workflows/**'
            java-kotlin:
              - '**/*.kt'
              - '**/*.kts'
              - '**/*.properties'
              - '**/src/**/resources/**'
              - 'app/src/main/AndroidManifest.xml'
              - 'app/src/main/proto/**'
              - 'app/src/main/res/**'
              - 'app/src/test/**'
              - 'app/proguard-rules.pro'
              - 'gradle/**'
            ruby:
              - '.tool-versions'
              - 'Dangerfile'
              - 'Gemfile*'

      - name: Replace double quotes
        id: replace-quotes
        if: ${{ github.event_name != 'schedule' }}
        uses: mad9000/actions-find-and-replace-string@bce4d50390d08b67e1822bd72fb54b3cf11b0ce9 # 5
        with:
          source: ${{ steps.check-files.outputs.changes }}
          find: '"'
          replace: "'"
          replaceAll: true

      # CodeQL supports the following values keywords for 'language': 'actions', 'c-cpp', 'csharp', 'go', 'java-kotlin', 'javascript-typescript', 'python', 'ruby', 'swift'
      # Use `actions` to analyze code written in workflow files like this one
      # Use `c-cpp` to analyze code written in C, C++ or both
      # Use 'java-kotlin' to analyze code written in Java, Kotlin or both
      # Use 'javascript-typescript' to analyze code written in JavaScript, TypeScript or both
      # To learn more about changing the languages that are analyzed or customizing the build mode for your analysis,
      # see https://docs.github.com/en/code-security/code-scanning/creating-an-advanced-setup-for-code-scanning/customizing-your-advanced-setup-for-code-scanning.
      # If you are analyzing a compiled language, you can modify the 'build-mode' for that language to customize how
      # your codebase is analyzed, see https://docs.github.com/en/code-security/code-scanning/creating-an-advanced-setup-for-code-scanning/codeql-code-scanning-for-compiled-languages
      - name: Filter CodeQL languages
        id: filter
        uses: JoshuaTheMiller/conditional-build-matrix@81b51eb8d89e07b86404934b5fecde1cea1163a5 # v2.0.1
        with:
          inputFile: .github/workflows/codeql.json
          filter: ${{ github.event_name == 'schedule' && "[]" || "[?contains(${{ steps.replace-quotes.outputs.value }}, language)]" }}

  analyze:
    name: Analyze (${{ matrix.language }})
    runs-on: 'ubuntu-latest'
    needs: generate-matrix
    timeout-minutes: 10
    permissions:
      # required for all workflows
      security-events: write

      # required to fetch internal or private CodeQL packs
      packages: read

      # only required for workflows in private repositories
      actions: read
      contents: read

    strategy:
      fail-fast: false
      matrix: ${{ fromJSON(needs.generate-matrix.outputs.matrix) }}

    concurrency:
      group: ${{ github.workflow }}-${{ matrix.language }}-${{ github.ref }}
      cancel-in-progress: true

    steps:
    - name: Checkout repository
      uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

    - name: Generate secret files
      if: ${{ matrix.language == 'java-kotlin' }}
      run: |
        echo ${{ secrets.KEYSTORE_PROPERTIES }} | base64 -d > ${{ github.workspace }}/keystore.properties

    - name: Set up JDK 21
      uses: actions/setup-java@be666c2fcd27ec809703dec50e508c2fdc7f6654 # v5.2.0
      if: ${{ matrix.language == 'java-kotlin' }}
      with:
        java-version-file: .tool-versions
        distribution: 'temurin'

    # Initializes the CodeQL tools for scanning.
    - name: Initialize CodeQL
      uses: github/codeql-action/init@95e58e9a2cdfd71adc6e0353d5c52f41a045d225 # v4.35.2
      with:
        languages: ${{ matrix.language }}
        build-mode: ${{ matrix.build-mode }}
        queries: security-extended

    # If the analyze step fails for one of the languages you are analyzing with
    # "We were unable to automatically build your code", modify the matrix above
    # to set the build mode to "manual" for that language. Then modify this step
    # to build your code.
    # ℹ️ Command-line programs to run using the OS shell.
    # 📚 See https://docs.github.com/en/actions/using-workflows/workflow-syntax-for-github-actions#jobsjob_idstepsrun
    - if: matrix.build-mode == 'manual'
      shell: bash
      run: |
        echo 'If you are using a "manual" build mode for one or more of the' \
          'languages you are analyzing, replace this with the commands to build' \
          'your code, for example:'
        echo '  make bootstrap'
        echo '  make release'
        exit 1

    - name: Perform CodeQL Analysis
      uses: github/codeql-action/analyze@95e58e9a2cdfd71adc6e0353d5c52f41a045d225 # v4.35.2
      with:
        category: "/language:${{matrix.language}}"
