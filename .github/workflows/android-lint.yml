name: Android Lint

on:
  push:
    branches: [ "main" ]
    paths:
      - '.github/workflows/android-lint.yml'
      - 'app/**/*.kt'
      - 'app/**/*.kts'
      - 'app/lint.xml'
      - 'app/src/main/AndroidManifest.xml'
      - 'app/src/main/proto/**'
      - 'app/src/main/res/**'
      - 'gradle/**'
  pull_request:
    branches: [ "main" ]
    paths:
      - '.github/workflows/android-lint.yml'
      - 'app/**/*.kt'
      - 'app/**/*.kts'
      - 'app/lint.xml'
      - 'app/src/main/AndroidManifest.xml'
      - 'app/src/main/proto/**'
      - 'app/src/main/res/**'
      - 'gradle/**'

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  pull-requests: write
  security-events: write

jobs:
  lint:
    name: Android Lint
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

    - name: Generate secret files
      run: |
        echo ${{ secrets.KEYSTORE_PROPERTIES }} | base64 -d > ${{ github.workspace }}/keystore.properties
        echo ${{ secrets.GOOGLE_SERVICES }} | base64 -d > ${{ github.workspace }}/app/google-services.json
        echo ${{ secrets.KOTZILLA_API_KEY }} | base64 -d > ${{ github.workspace }}/app/kotzilla.json

    - name: Set up JDK 21
      uses: actions/setup-java@be666c2fcd27ec809703dec50e508c2fdc7f6654 # v5.2.0
      with:
        java-version-file: .tool-versions
        distribution: 'temurin'

    # Configure Gradle for optimal use in GitHub Actions, including caching of downloaded dependencies.
    # See: https://github.com/gradle/actions/blob/main/setup-gradle/README.md
    - name: Setup Gradle
      uses: gradle/actions/setup-gradle@50e97c2cd7a37755bbfafc9c5b7cafaece252f6e # v6.1.0

    - name: Android Lint
      uses: burrunan/gradle-cache-action@663fbad34e03c8f12b27f4999ac46e3d90f87eca # v3.0.1
      with:
        arguments: lint

    - name: Report
      uses: hidakatsuya/action-report-android-lint@e95452c02063fc0a9920a545ffc9d0ee82b58bfb # v1.3.0
      with:
        result-path: app/**/reports/lint-results-debug.xml
        fail-on-warning: false

    - name: Upload app SARIF report
      uses: github/codeql-action/upload-sarif@95e58e9a2cdfd71adc6e0353d5c52f41a045d225 # v4.35.2
      with:
        sarif_file: ${{ github.workspace }}/app/build/reports/lint-results-debug.sarif
        checkout_path: ${{ github.workspace }}
        category: "android-lint"

    - name: Upload Konsist SARIF report
      uses: github/codeql-action/upload-sarif@95e58e9a2cdfd71adc6e0353d5c52f41a045d225 # v4.35.2
      with:
        sarif_file: ${{ github.workspace }}/app/konsist/build/reports/lint-results-debug.sarif
        checkout_path: ${{ github.workspace }}
        category: "konsist"
