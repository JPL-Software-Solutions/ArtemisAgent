name: Pitest Mutation Testing

on:
  push:
    branches: [ "main" ]
    paths:
      - .github/workflows/pitest.yml
      - build-logic/*.gradle.kts
      - build-logic/src/main/kotlin/artemis/agent/gradle/Helpers.kt
      - gradle/**
      - IAN/build.gradle.kts
      - IAN/*/build.gradle.kts
      - IAN/src/**/*.kt
      - IAN/*/src/**/*.kt

jobs:
  pitest:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        path:
          - 'IAN'
          - 'IAN/enums'
          - 'IAN/grid'
          - 'IAN/listener'
          - 'IAN/packets'
          - 'IAN/udp'
          - 'IAN/util'
          - 'IAN/vesseldata'
          - 'IAN/world'
    permissions:
      contents: read
      checks: write
      pull-requests: write
    concurrency:
      group: ${{ github.workflow }}-${{ matrix.path }}

    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          fetch-depth: 2

      - name: Restore Pitest history file
        uses: actions/cache/restore@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: ${{ github.workspace }}/${{ matrix.path }}/build/pitHistory.txt
          key: pitest-history:${{ matrix.path }}

      - name: Generate secret files
        run: |
          echo ${{ secrets.KEYSTORE_PROPERTIES }} | base64 -d > ${{ github.workspace }}/keystore.properties

      - name: Set up JDK 21
        uses: actions/setup-java@be666c2fcd27ec809703dec50e508c2fdc7f6654 # v5.2.0
        with:
          java-version-file: .tool-versions
          distribution: 'temurin'

      # Configure Gradle for optimal use in GitHub Actions, including caching of downloaded dependencies.
      # See: https://github.com/gradle/actions/blob/main/setup-gradle/README.md
      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@5e2ebd065dc2488b7a6ad670704656cbbe1e8f60 # v6.1.1

      - name: Determine Gradle module
        id: get-module
        uses: mad9000/actions-find-and-replace-string@789e104bfa5a1e90579e74de187e696450611aa2 # 6
        with:
          source: ${{ matrix.path }}
          find: '/'
          replace: ':'

      - name: Run Pitest
        run: ./gradlew :${{ steps.get-module.outputs.value }}:pitest

      - name: Check for any mutations
        id: mutations-check
        uses: thebinaryfelix/check-file-existence-action@fef222387dab4e18c8d7b379f209e8ef847b154d # 2.0.0
        with:
          files: ${{ github.workspace }}/${{ matrix.path }}/build/reports/pitest/mutations.xml

      - name: Upload Pitest report
        if: steps.mutations-check.outputs.exists == 'true'
        uses: Bonajo/pitest-report-action@2513c42306afe1bde0bfa16da91e26b7c8f026b7 # v1.1.1
        with:
          name: Pitest Report (${{ matrix.path }})
          file: ${{ github.workspace }}/${{ matrix.path }}/build/reports/pitest/mutations.xml
          annotation-types: ALL

      - name: Cache Pitest history file
        uses: actions/cache/save@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: ${{ github.workspace }}/${{ matrix.path }}/build/pitHistory.txt
          key: pitest-history:${{ matrix.path }}-${{ hashFiles('**/build/pitHistory.txt') }}
